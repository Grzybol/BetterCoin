# BetterCoin Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Configuration
spring.application.name=BetterCoin Backend

# Logging Configuration
logging.level.com.bettercoin=INFO
logging.level.org.web3j=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# BetterCoin Configuration
bettercoin.rpc.url=${RPC_URL:http://localhost:8545}
bettercoin.contract.address=${CONTRACT_ADDRESS:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# CORS Configuration
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*